venues:
  - name: "CVPR"
    full_name: "IEEE/CVF Conference on Computer Vision and Pattern Recognition"
    relevance_en: "Major venue for audio-visual localization, segmentation, representation learning, and multimodal video understanding."
    relevance_ja: "AV 定位、セグメンテーション、表現学習、マルチモーダル動画理解の主要会議。"
    url: "https://cvpr.thecvf.com/"
  - name: "ICCV"
    full_name: "IEEE/CVF International Conference on Computer Vision"
    relevance_en: "Major venue for audio-visual correspondence, video understanding, and visual speech/lip-reading work."
    relevance_ja: "AV 対応学習、動画理解、視覚音声・読唇研究の主要会議。"
    url: "https://iccv.thecvf.com/"
  - name: "ECCV"
    full_name: "European Conference on Computer Vision"
    relevance_en: "Frequent venue for audio-visual event localization, segmentation, object-sound grounding, and source separation."
    relevance_ja: "AV イベント定位、セグメンテーション、音源物体接地、音源分離が多い会議。"
    url: "https://eccv.ecva.net/"
  - name: "NeurIPS"
    full_name: "Conference on Neural Information Processing Systems"
    relevance_en: "Major ML venue for self-supervised audio-visual representation learning and multimodal learning."
    relevance_ja: "自己教師あり AV 表現学習・マルチモーダル学習の主要 ML 会議。"
    url: "https://neurips.cc/"
  - name: "ICLR"
    full_name: "International Conference on Learning Representations"
    relevance_en: "Relevant for representation learning, contrastive learning, and multimodal foundation-model methods."
    relevance_ja: "表現学習、対照学習、マルチモーダル基盤モデル手法に関連。"
    url: "https://iclr.cc/"
  - name: "ICML"
    full_name: "International Conference on Machine Learning"
    relevance_en: "Relevant for general multimodal learning methods and scalable self-supervision."
    relevance_ja: "一般的なマルチモーダル学習手法と大規模自己教師に関連。"
    url: "https://icml.cc/"
  - name: "ACM Multimedia"
    full_name: "ACM International Conference on Multimedia"
    relevance_en: "Central venue for audio-visual learning, multimedia retrieval, AVQA, and cross-modal reasoning."
    relevance_ja: "AV 学習、マルチメディア検索、AVQA、クロスモーダル推論の中心的会議。"
    url: "https://www.acmmm.org/"
  - name: "ICASSP"
    full_name: "IEEE International Conference on Acoustics, Speech and Signal Processing"
    relevance_en: "Major audio/speech/signal-processing venue; AudioSet and VGGSound are tied to ICASSP papers."
    relevance_ja: "音響・音声・信号処理の主要会議。AudioSet や VGGSound も ICASSP 論文として発表。"
    url: "https://2026.ieeeicassp.org/"
  - name: "INTERSPEECH"
    full_name: "Conference of the International Speech Communication Association"
    relevance_en: "Major venue for audio-visual speech recognition, lip reading, speech enhancement, and speaker tasks."
    relevance_ja: "AV 音声認識、読唇、音声強調、話者タスクの主要会議。"
    url: "https://www.interspeech2026.org/"
  - name: "DCASE Workshop"
    full_name: "Detection and Classification of Acoustic Scenes and Events Workshop"
    relevance_en: "Relevant for sound event detection and increasingly multimodal/audio-visual acoustic scene tasks."
    relevance_ja: "音響シーン・イベント検出に関係し、近年は AV 音響シーン課題にも関連。"
    url: "https://dcase.community/"
  - name: "ACL / EMNLP / NAACL"
    full_name: "Major computational linguistics conferences"
    relevance_en: "Relevant when audio-visual perception is connected to dialogue, QA, captioning, or language reasoning."
    relevance_ja: "AV 知覚が対話、QA、キャプション、言語推論に接続する場合に関連。"
    url: "https://www.aclweb.org/portal/"
